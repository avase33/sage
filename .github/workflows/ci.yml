name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with server + dev extras)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Smoke-test the CLI (offline mock)
        run: |
          python -m sage chat "What is 12 * 12?"
          python -m sage docs
      - name: Import the FastAPI app
        run: python -c "import sage.server; print('server import OK')"
